<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" role="img">
  <title>QUARENTEI — Capa do E-book — Dra. Bruna Ghetti</title>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#F8ECD8"/>
      <stop offset="32%"  stop-color="#EC9A6E"/>
      <stop offset="68%"  stop-color="#D45A28"/>
      <stop offset="100%" stop-color="#C03C14"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#C4973A" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#E8C85A"/>
      <stop offset="50%"  stop-color="#F5E080"/>
      <stop offset="80%"  stop-color="#E8C85A"/>
      <stop offset="100%" stop-color="#C4973A" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="phoenixGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#F8ECC0"/>
      <stop offset="50%"  stop-color="#D4A83C"/>
      <stop offset="100%" stop-color="#B8841A"/>
    </linearGradient>
    <linearGradient id="spineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#9A2C0E"/>
      <stop offset="100%" stop-color="#C03C14"/>
    </linearGradient>
  </defs>

  <!-- Spine -->
  <rect x="0" y="0" width="14" height="560" fill="url(#spineGrad)"/>
  <!-- Cover background -->
  <rect x="14" y="0" width="386" height="560" fill="url(#bgGrad)"/>

  <!-- Top accent bar -->
  <rect x="14" y="0" width="386" height="4" fill="#9A2C0E"/>
  <rect x="14" y="4" width="386" height="1.5" fill="url(#goldLine)"/>

  <!-- Bottom accent bar -->
  <rect x="14" y="554.5" width="386" height="1.5" fill="url(#goldLine)" opacity="0.7"/>
  <rect x="14" y="556" width="386" height="4" fill="#9A2C0E"/>

  <!-- Spine text -->
  <text x="7" y="280" font-family="Georgia, serif" font-size="7" fill="#F8ECC0" opacity="0.75"
        text-anchor="middle" transform="rotate(-90,7,280)" letter-spacing="1">QUARENTEI · Dra. Bruna Ghetti</text>

  <!-- TITLE -->
  <text x="207" y="74" font-family="Georgia,'Times New Roman',serif" font-size="54"
        font-weight="700" fill="#180804" text-anchor="middle" letter-spacing="4" opacity="0.93">QUARENTEI</text>

  <!-- Gold rule under title -->
  <rect x="80" y="82" width="254" height="1.5" fill="url(#goldLine)"/>

  <!-- Subtitle -->
  <text x="207" y="101" font-family="Georgia,serif" font-size="9" fill="#220C06"
        text-anchor="middle" letter-spacing="0.8" opacity="0.82">O GUIA MÉDICO QUE TODA MULHER 40+ MERECIA TER</text>

  <!-- ── PHOENIX ILLUSTRATION ── -->
  <g opacity="0.84">
    <!-- Head -->
    <ellipse cx="207" cy="178" rx="14" ry="16" fill="none" stroke="url(#phoenixGold)" stroke-width="1.4"/>
    <!-- Beak -->
    <path d="M221,172 Q231,169 233,174 Q230,179 221,177Z" fill="url(#phoenixGold)" opacity="0.9"/>
    <!-- Eye -->
    <circle cx="218" cy="175" r="2.2" fill="#180804" opacity="0.65"/>
    <circle cx="219" cy="174.2" r="0.7" fill="#F8ECC0" opacity="0.8"/>

    <!-- Crest feathers -->
    <path d="M200,166 Q203,150 207,142 Q211,150 213,166" fill="none" stroke="url(#phoenixGold)" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M194,169 Q196,153 200,145 Q204,154 202,171" fill="none" stroke="url(#phoenixGold)" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
    <path d="M213,166 Q215,150 220,143 Q223,153 219,169" fill="none" stroke="url(#phoenixGold)" stroke-width="1" stroke-linecap="round" opacity="0.6"/>

    <!-- Neck -->
    <path d="M207,194 Q202,215 200,238 Q203,228 207,218 Q211,228 214,238 Q212,215 207,194Z" fill="none" stroke="url(#phoenixGold)" stroke-width="1.6" stroke-linecap="round"/>

    <!-- Left wing - major -->
    <path d="M207,250 Q175,228 138,206 Q112,192 96,196 Q104,214 126,220 Q150,226 172,238 Q192,250 205,268Z"
