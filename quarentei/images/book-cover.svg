    <path d="M207,260 Q242,242 284,222 Q306,212 320,218 Q311,232 290,236 Q266,242 244,255 Q222,268 209,282Z"
          fill="none" stroke="url(#phoenixGold)" stroke-width="1.1" stroke-linecap="round" opacity="0.6"/>
    <path d="M207,270 Q244,256 288,238 Q308,230 322,238 Q312,250 292,252 Q268,256 244,270 Q221,283 208,296Z"
          fill="none" stroke="url(#phoenixGold)" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>

    <!-- Body -->
    <path d="M200,238 Q196,262 194,300 Q196,290 207,278 Q218,290 220,300 Q218,262 214,238Z"
          fill="none" stroke="url(#phoenixGold)" stroke-width="1.4" stroke-linecap="round"/>

    <!-- Body feathers -->
    <path d="M200,285 Q193,298 191,316 Q198,306 204,290Z" fill="url(#phoenixGold)" opacity="0.45"/>
    <path d="M214,285 Q221,298 223,316 Q216,306 210,290Z" fill="url(#phoenixGold)" opacity="0.45"/>
    <path d="M205,308 Q198,322 196,338 Q203,328 208,312Z" fill="url(#phoenixGold)" opacity="0.38"/>
    <path d="M209,308 Q216,322 218,338 Q211,328 207,312Z" fill="url(#phoenixGold)" opacity="0.38"/>

    <!-- Left tail -->
    <path d="M196,338 Q174,378 154,430 Q148,452 158,466 Q168,444 180,424 Q196,398 204,368 Q210,350 206,336Z"
          fill="none" stroke="url(#phoenixGold)" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M202,340 Q182,382 165,432 Q160,454 170,468 Q178,448 190,428 Q205,402 211,372 Q216,354 210,340Z"
          fill="none" stroke="url(#phoenixGold)" stroke-width="0.9" stroke-linecap="round" opacity="0.55"/>

    <!-- Right tail -->
    <path d="M218,338 Q240,378 260,430 Q266,452 256,466 Q246,444 234,424 Q218,398 210,368 Q204,350 208,336Z"
          fill="none" stroke="url(#phoenixGold)" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M212,340 Q232,382 249,432 Q254,454 244,468 Q236,448 224,428 Q209,402 203,372 Q198,354 204,340Z"
          fill="none" stroke="url(#phoenixGold)" stroke-width="0.9" stroke-linecap="round" opacity="0.55"/>

    <!-- Feet / talons left -->
    <path d="M196,338 Q184,350 172,354" fill="none" stroke="url(#phoenixGold)" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M196,338 Q188,352 184,362" fill="none" stroke="url(#phoenixGold)" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M196,338 Q194,354 192,364" fill="none" stroke="url(#phoenixGold)" stroke-width="1.2" stroke-linecap="round"/>

    <!-- Feet / talons right -->
    <path d="M218,338 Q230,350 242,354" fill="none" stroke="url(#phoenixGold)" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M218,338 Q226,352 230,362" fill="none" stroke="url(#phoenixGold)" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M218,338 Q220,354 222,364" fill="none" stroke="url(#phoenixGold)" stroke-width="1.2" stroke-linecap="round"/>

    <!-- Spark particles -->
    <circle cx="100" cy="200" r="1.8" fill="#F5E060" opacity="0.7"/>
    <circle cx="88"  cy="218" r="1.2" fill="#F5E060" opacity="0.5"/>
    <circle cx="112" cy="185" r="1.0" fill="#F5E060" opacity="0.55"/>
    <circle cx="314" cy="200" r="1.8" fill="#F5E060" opacity="0.7"/>
    <circle cx="326" cy="218" r="1.2" fill="#F5E060" opacity="0.5"/>
    <circle cx="302" cy="185" r="1.0" fill="#F5E060" opacity="0.55"/>
    <circle cx="207" cy="130" r="1.4" fill="#F5E060" opacity="0.65"/>
    <circle cx="196" cy="138" r="1.0" fill="#F5E060" opacity="0.5"/>
    <circle cx="218" cy="138" r="1.0" fill="#F5E060" opacity="0.5"/>
    <circle cx="158" cy="446" r="1.4" fill="#F5E060" opacity="0.4"/>
    <circle cx="256" cy="446" r="1.4" fill="#F5E060" opacity="0.4"/>
  </g>

  <!-- Gold rule above author -->
  <rect x="96" y="470" width="222" height="1.2" fill="url(#goldLine)"/>

  <!-- Author name -->
  <text x="207" y="493" font-family="Georgia,'Times New Roman',serif" font-size="18"
        font-weight="400" fill="#180804" text-anchor="middle" letter-spacing="0.6" opacity="0.94">Dra. Bruna Ghetti</text>

  <!-- Author subtitle -->
  <text x="207" y="509" font-family="Georgia,serif" font-size="8.5" fill="#220C06"
        text-anchor="middle" letter-spacing="0.4" opacity="0.76">Ginecologista · Saúde Íntima e Longevidade</text>

  <!-- Gold rule below author -->
  <rect x="116" y="517" width="182" height="1.2" fill="url(#goldLine)"/>

  <!-- Quote -->
  <text x="207" y="534" font-family="Georgia,serif" font-size="7.8" font-style="italic"
        fill="#180804" text-anchor="middle" opacity="0.68">"Não troco meus 50 pelos 20 de jeito nenhum"</text>
  <text x="207" y="547" font-family="Georgia,serif" font-size="7.5" fill="#180804"
        text-anchor="middle" opacity="0.55">Cátia Damasceno</text>

</svg>
