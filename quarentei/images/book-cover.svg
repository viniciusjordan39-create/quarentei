    <path d="M207,270 Q170,256 126,238 Q106,230 92,238 Q102,250 122,252 Q146,256 170,270 Q193,283 206,296Z"
          fill="none" stroke="url(#phoenixGold)" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>

    <!-- Right wing - major -->
    <path d="M207,250 Q239,228 276,206 Q302,192 318,196 Q310,214 288,220 Q264,226 242,238 Q222,250 209,268Z"
